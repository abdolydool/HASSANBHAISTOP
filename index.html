<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hassan bhai stopppp ULTIMATE</title>
    <style>
        :root {
            --shake: 0px;
            --invert: 0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ff0000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Impact', 'Arial Black', cursive;
            cursor: none;
            user-select: none;
            -webkit-user-select: none;
            animation: bgAgony 0.08s infinite alternate;
            filter: invert(var(--invert));
            transition: filter 0.05s;
            position: relative;
        }
        @keyframes bgAgony {
            0% { background: #ff0000; }
            20% { background: #00ff00; }
            40% { background: #0000ff; }
            60% { background: #ffff00; }
            80% { background: #ff00ff; }
            100% { background: #00ffff; }
        }
        .global-shake {
            animation: shakeGlobe 0.05s infinite;
        }
        @keyframes shakeGlobe {
            0% { transform: translate(2px, -2px); }
            25% { transform: translate(-3px, 1px); }
            50% { transform: translate(3px, 3px); }
            75% { transform: translate(-1px, -3px); }
            100% { transform: translate(0, 0); }
        }
        .marquee {
            position: fixed;
            left: 0;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            pointer-events: none;
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 4px 4px 0 #ff0000, 8px 8px 0 #00ff00;
            animation: marqueeScroll 6s linear infinite;
        }
        @keyframes marqueeScroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .title {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(4rem, 12vw, 9rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 5px 5px 0 #f0f, 10px 10px 0 #0ff, 15px 15px 0 #ff0;
            animation: titleShake 0.1s infinite alternate, colorFlip 0.15s infinite alternate;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
        }
        @keyframes titleShake {
            0% { transform: translateX(-50%) translate(0, 0); }
            25% { transform: translateX(-50%) translate(8px, -8px); }
            50% { transform: translateX(-50%) translate(-8px, 8px); }
            75% { transform: translateX(-50%) translate(-8px, -8px); }
            100% { transform: translateX(-50%) translate(8px, 8px); }
        }
        @keyframes colorFlip {
            0% { color: #fff; }
            100% { color: #ff0; }
        }
        #annoyingBtn {
            position: absolute;
            padding: 30px 60px;
            font-size: 2.5rem;
            font-weight: bold;
            background: #ff0;
            color: #000;
            border: 10px dashed #f00;
            border-radius: 60px;
            z-index: 50;
            white-space: nowrap;
            box-shadow: 0 0 90px #ff0000, 0 0 180px #0000ff;
            animation: btnPulse 0.3s infinite alternate;
            cursor: pointer;
            transition: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        @keyframes btnPulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 90px #f00, 0 0 180px #00f; }
            100% { transform: translate(-50%, -50%) scale(1.15); box-shadow: 0 0 120px #ff0, 0 0 210px #0ff; }
        }
        .stop-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 70;
            font-size: 11px;
            color: rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            transition: opacity 0.1s;
        }
        .floating-text {
            position: fixed;
            pointer-events: none;
            z-index: 30;
            font-size: 2.8rem;
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 20px red, 0 0 40px blue;
            animation: floatAway 2s forwards;
        }
        @keyframes floatAway {
            0% { opacity: 1; transform: translate(0, 0) scale(0.3); }
            100% { opacity: 0; transform: translate(calc(var(--dx) * 1px), calc(var(--dy) * 1px)) scale(2.2); }
        }
        .rickroll-container {
            position: fixed;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: -99;
        }
    </style>
</head>
<body class="global-shake">
    <!-- Marquees -->
    <div class="marquee" style="top:5px;">🔥 hassan bhai stopppp hassan bhaii actuallyyyy 🔥 hassan bhai stopppp hassan bhaii actuallyyyy 🔥</div>
    <div class="marquee" style="top:85px; animation-delay: -3s;">🦖 hassan bhai actuallyyyy stopppp 🦖 hassan bhai actuallyyyy stopppp 🦖</div>
    <div class="marquee" style="top:165px; animation-delay: -5s; transform: rotate(2deg);">💥 hassan bhai stopppp 💥 hassan bhaii actuallyyyy 💥</div>
    <div class="title">hassan bhai stopppp</div>

    <button id="annoyingBtn">hassan bhai stopppp</button>
    <button class="stop-btn" id="theOnlyStopBtn" title="you can't stop it">😵 stop???</button>

    <!-- Rickroll iframe (hidden) -->
    <div class="rickroll-container">
        <iframe id="rickrollIframe" width="1" height="1" src="" allow="autoplay" style="border:none;"></iframe>
    </div>

    <script>
        (function() {
            // ============ SUPER ANNOYANCE ENGINE ============
            const btn = document.getElementById('annoyingBtn');
            const stopBtn = document.getElementById('theOnlyStopBtn');
            let voiceInterval = null;
            let mp3AudioElement = null;
            let rickrollStarted = false;
            let audioCtx = null;

            // Init audio context
            function initAudioCtx() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                }
            }

            function playPiercingBeep() {
                if (!audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.25);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.35);
            }

            // MP3 playback - file named "hassan.mp3" in same folder as this HTML
            function setupMP3() {
                if (mp3AudioElement) return;
                // Create an audio element for your recorded "hassan.mp3"
                mp3AudioElement = new Audio();
                // File is in the root of the repository, next to index.html
                mp3AudioElement.src = 'hassan.mp3';
                mp3AudioElement.loop = true;
                mp3AudioElement.volume = 1.0;
                // Play as soon as we get user gesture
                mp3AudioElement.play().catch(e => console.log('MP3 will play on next user interaction'));
            }

            // Rickroll via YouTube
            function startRickroll() {
                if (rickrollStarted) return;
                rickrollStarted = true;
                const iframe = document.getElementById('rickrollIframe');
                // Use YouTube embed with autoplay, loop, and no controls
                iframe.src = 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&loop=1&playlist=dQw4w9WgXcQ&mute=0';
                // Ensure iframe is allowed to autoplay (needs user gesture)
            }

            // Two overlapping speech voices: one low-pitched, one high-pitched
            function speakAnnoyanceDual() {
                if (!window.speechSynthesis) return;

                // Cancel any previous to make stacking
                speechSynthesis.cancel();

                // First utterance: low, slow
                const utter1 = new SpeechSynthesisUtterance('hassan bhai stopppp');
                utter1.rate = 0.65;
                utter1.pitch = 0.4;
                utter1.volume = 1;
                // Second utterance: high, fast, "hassan bhaii actuallyyyy"
                const utter2 = new SpeechSynthesisUtterance('hassan bhaii actuallyyyy');
                utter2.rate = 1.3;
                utter2.pitch = 2.0;
                utter2.volume = 1;

                // Speak with a slight stagger
                speechSynthesis.speak(utter1);
                setTimeout(() => speechSynthesis.speak(utter2), 100);
            }

            // Continuous voice loop plus MP3
            function startContinuousAnnoyance() {
                if (voiceInterval) return;
                speakAnnoyanceDual();
                playPiercingBeep();
                // Ensure MP3 is playing
                if (mp3AudioElement && mp3AudioElement.paused) {
                    mp3AudioElement.play().catch(()=>{});
                }
                voiceInterval = setInterval(() => {
                    speakAnnoyanceDual();
                    playPiercingBeep();
                }, 1400); // rapid overlapping
            }

            function stopAnnoyance() {
                if (voiceInterval) clearInterval(voiceInterval);
                if (window.speechSynthesis) speechSynthesis.cancel();
                if (mp3AudioElement) { mp3AudioElement.pause(); mp3AudioElement.currentTime = 0; }
                // Reload to stop everything including rickroll
                location.reload();
            }

            // Button movement - extremely evasive
            function moveButtonAway(mx, my) {
                const btnW = btn.offsetWidth, btnH = btn.offsetHeight;
                const maxX = window.innerWidth - btnW, maxY = window.innerHeight - btnH;
                let nx, ny, tries = 0;
                do {
                    nx = Math.random() * maxX;
                    ny = Math.random() * maxY;
                    tries++;
                } while (Math.abs(nx + btnW/2 - mx) < 200 && Math.abs(ny + btnH/2 - my) < 200 && tries < 50);
                btn.style.left = nx + 'px';
                btn.style.top = ny + 'px';
            }

            // Spawn floating text with both phrases
            function spawnFloatingText(x, y) {
                const phrases = ['hassan bhai stopppp', 'hassan bhaii actuallyyyy', 'HASSAN BHAI STOOOPPP', 'actuallyyy hassan bhai'];
                const txt = document.createElement('div');
                txt.className = 'floating-text';
                txt.textContent = phrases[Math.floor(Math.random() * phrases.length)];
                txt.style.left = x + 'px';
                txt.style.top = y + 'px';
                txt.style.setProperty('--dx', (Math.random() - 0.5) * 500);
                txt.style.setProperty('--dy', (Math.random() - 0.5) * 500);
                document.body.appendChild(txt);
                setTimeout(() => txt.remove(), 2100);
            }

            // Invert screen periodically for extra headache
            let invertInterval = null;
            function startInvertSeizures() {
                if (invertInterval) return;
                invertInterval = setInterval(() => {
                    document.documentElement.style.setProperty('--invert', Math.random() > 0.5 ? '1' : '0');
                }, 200);
            }

            // MAIN EVENT HANDLING
            btn.addEventListener('mouseover', (e) => {
                moveButtonAway(e.clientX, e.clientY);
                if (Math.random() < 0.5) spawnFloatingText(e.clientX, e.clientY);
            });

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                initAudioCtx();
                setupMP3();
                startRickroll();
                startInvertSeizures();
                if (!voiceInterval) startContinuousAnnoyance();
                speakAnnoyanceDual();
                playPiercingBeep();
                // Spawn massive texts
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => spawnFloatingText(e.clientX + Math.random()*200-100, e.clientY + Math.random()*200-100), i*60);
                }
                moveButtonAway(e.clientX, e.clientY);
                // Increase global shake tempo
                document.body.style.animationDuration = '0.04s';
                // After 10 clicks, add even more marquees
                if (!window.__clickCount) window.__clickCount = 0;
                window.__clickCount++;
                if (window.__clickCount % 8 === 0) {
                    const newMarquee = document.querySelector('.marquee').cloneNode(true);
                    newMarquee.style.top = (30 + Math.random() * window.innerHeight * 0.8) + 'px';
                    newMarquee.style.animationDuration = (2 + Math.random() * 4) + 's';
                    document.body.appendChild(newMarquee);
                }
            });

            // The "stop" button is also impossible to click
            stopBtn.addEventListener('mouseover', (e) => {
                const maxX = window.innerWidth - stopBtn.offsetWidth;
                const maxY = window.innerHeight - stopBtn.offsetHeight;
                stopBtn.style.left = (Math.random() * maxX) + 'px';
                stopBtn.style.top = (Math.random() * maxY) + 'px';
                stopBtn.style.position = 'fixed';
            });

            stopBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                stopAnnoyance();
            });

            // Any click on the page (not on the stop button) adds chaos
            document.addEventListener('click', (e) => {
                if (e.target === btn || e.target === stopBtn) return;
                initAudioCtx();
                setupMP3();
                startRickroll();
                playPiercingBeep();
                spawnFloatingText(e.clientX, e.clientY);
                moveButtonAway(e.clientX, e.clientY);
                if (!voiceInterval) startContinuousAnnoyance();
            });

            // Prevent context menu
            document.addEventListener('contextmenu', e => e.preventDefault());

            // Initial mood
            window.addEventListener('load', () => {
                for (let i = 0; i < 4; i++) {
                    setTimeout(() => spawnFloatingText(Math.random() * window.innerWidth, Math.random() * window.innerHeight), i * 300);
                }
                console.log('🤬 hassan bhai stopppp engine running.');
                console.log('Place your recorded MP3 file named exactly "hassan.mp3" in the same folder as this HTML file.');
            });
        })();
    </script>
</body>
</html>
